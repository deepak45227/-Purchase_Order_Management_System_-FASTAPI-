<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>POMS - Purchase Order Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/main.css"/>
</head>
<body>

<!-- Login screen -->
<div id="loginScreen" class="login-screen">
  <div class="login-bg">
    <div class="login-orb orb1"></div>
    <div class="login-orb orb2"></div>
    <div class="login-orb orb3"></div>
  </div>

  <div class="login-card">
    <div class="login-brand">
      <span class="brand-icon">PO</span>
      <span class="brand-name">POMS</span>
    </div>

    <h1 class="login-title">Welcome back</h1>
    <p class="login-sub">Sign in to manage your purchase orders</p>

    <div id="loginError" class="alert alert-error hidden"></div>

    <div class="form-group">
      <label class="form-label">Username</label>
      <input type="text" id="loginUsername" class="form-input" placeholder="e.g. admin" value="admin"/>
    </div>

    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" id="loginPassword" class="form-input" placeholder="password" value="admin123"/>
    </div>

    <button id="loginBtn" class="btn btn-primary btn-full">
      <span class="btn-text">Sign In</span>
      <span class="btn-loader hidden">Signing in...</span>
    </button>

    <div class="login-demo-hint">
      <strong>Demo accounts:</strong>
      admin/admin123, manager/manager123, viewer/viewer123
    </div>
  </div>
</div>

<!-- Main app -->
<div id="appShell" class="app hidden">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <span class="brand-icon">PO</span>
      <span class="brand-name">POMS</span>
    </div>

    <nav class="sidebar-nav">
      <button class="nav-item active" data-page="dashboard">
        <span class="nav-icon">DB</span> Dashboard
      </button>
      <button class="nav-item" data-page="purchase-orders">
        <span class="nav-icon">PO</span> Purchase Orders
      </button>
      <button class="nav-item" data-page="vendors">
        <span class="nav-icon">VN</span> Vendors
      </button>
      <button class="nav-item" data-page="products">
        <span class="nav-icon">PR</span> Products
      </button>
    </nav>

    <div class="sidebar-user" id="sidebarUser">
      <div class="user-avatar" id="userAvatar">A</div>
      <div class="user-info">
        <div class="user-name" id="userName">Admin</div>
        <div class="user-role" id="userRole">admin</div>
      </div>
      <button class="logout-btn" id="logoutBtn" title="Logout">OUT</button>
    </div>
  </aside>

  <main class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <button class="sidebar-toggle" id="sidebarToggle">MENU</button>
        <div class="page-title-wrap">
          <h2 class="page-title" id="pageTitle">Dashboard</h2>
          <div class="breadcrumb" id="breadcrumb">Overview</div>
        </div>
      </div>
      <div class="topbar-right">
        <div class="topbar-date" id="topbarDate"></div>
      </div>
    </header>

    <div class="content-area" id="contentArea">
      <!-- Content is rendered by page scripts -->
    </div>
  </main>
</div>

<!-- Modal -->
<div id="modalOverlay" class="modal-overlay hidden">
  <div class="modal" id="modalBox">
    <div class="modal-header">
      <h3 class="modal-title" id="modalTitle">Modal</h3>
      <button class="modal-close" id="modalClose">X</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>
</div>

<!-- Toasts -->
<div id="toastContainer" class="toast-container"></div>

<script src="/static/js/api.js"></script>
<script src="/static/js/ui.js"></script>
<script src="/static/js/pages/dashboard.js"></script>
<script src="/static/js/pages/vendors.js"></script>
<script src="/static/js/pages/products.js"></script>
<script src="/static/js/pages/purchase-orders.js"></script>
<script src="/static/js/app.js"></script>
</body>
</html>
